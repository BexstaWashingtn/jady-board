services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: jady
      POSTGRES_USER: jady
      POSTGRES_PASSWORD: jady
    ports:
      - "5432:5432"
    volumes:
      - jady-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jady -d jady"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  jady-postgres:
